name: Refresh profile SVGs

on:
  push:
    branches: [main]
    paths:
      - "config.yml"
      - "ascii-art.txt"
      - "portrait.png"
      - "portrait.jpg"
      - "build.py"
      - "image_to_ascii.py"
  schedule:
    # Runs daily at 00:15 UTC to keep the Uptime counter fresh.
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SVGs
        run: python build.py

      - name: Commit and push SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add light_mode.svg dark_mode.svg
          if git diff --cached --quiet; then
            echo "SVGs unchanged — skipping commit."
          else
            git commit -m "chore: refresh SVGs [skip ci]"
            git push
          fi
